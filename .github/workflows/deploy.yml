name: Deploy SankalpLR to Production

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3

      # ==========================================
      # 1. FRONTEND BUILD
      # ==========================================
      - name: ⚙️ Setup Node.js (Frontend)
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - name: 📦 Install Frontend Dependencies
        working-directory: ./client
        run: npm install

      - name: 🏗️ Build Frontend (Vite)
        working-directory: ./client
        run: npm run build

      # ==========================================
      # 2. SERVER DEPLOYMENT (SSH via PM2)
      # ==========================================
      - name: 🚀 Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }} # usually 22
          script: |
            # 1. Navigate to the project root on the live server
            # REPLACE THIS PATH WITH YOUR ACTUAL SERVER FOLDER PATH!
            cd /var/www/sankalplr
            
            # 2. Pull the latest code from GitHub
            git fetch --all
            git reset --hard origin/main
            git pull origin main
            
            # 3. Setup Backend
            cd server
            npm install --production
            
            # 4. Restart the node server using PM2
            # If PM2 is not running it, it will start it.
            pm2 restart sankalplr-api || pm2 start src/server.js --name "sankalplr-api"
