name: CI/CD Pipeline - AWS (SankalpLR)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3

      # ==========================================
      # SERVER DEPLOYMENT (AWS - SSH)
      # ==========================================
      - name: 🚀 Deploy to AWS Production Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 65.0.88.85
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            # 1. Navigate to the App directory on AWS
            cd /var/www/html/sankalplr
            
            # 2. Pull the latest code
            git fetch --all
            git reset --hard origin/main
            git pull origin main

            # 3. Build Frontend (React Vite) ON AWS directly
            cd client
            npm install
            export VITE_API_BASE_URL="https://sankalplrapi.celworld.org/api"
            export VITE_SERVER_URL="https://sankalplr.celworld.org/"
            npm run build
            cd ..
            
            # 4. Secure Backend Environment
            cd server
            npm install --production
            
            # 5. Restart the node server using PM2 (Forcing Port 5021)
            pm2 restart sankalplr-api || pm2 start src/server.js --name "sankalplr-api" --env PORT=5021
            pm2 save

